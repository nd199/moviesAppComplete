spring:
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  main:
    web-application-type: servlet

  sendgrid:
    api:
      key: ${SENDGRID_API_KEY}
    from:
      email: ${SENDGRID_FROM_EMAIL}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
app:
  allowed:
    origins: "https://movies-app-complete-payment.vercel.app,
    https://movies-app-complete.vercel.app,
    https://movies-app-complete-gmco.vercel.app
    https://movie-payment.onrender.com"

logging:
  level:
    web: debug
    sql: debug
    org:
      springframework:
        security: debug