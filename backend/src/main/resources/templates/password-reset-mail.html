<!DOCTYPE html>
<html lang="en">
<head>
    <title>Password Reset</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header {
            padding-bottom: 20px;
            border-bottom: 1px solid #eeeeee;
        }

        .logo {
            max-width: 350px;
            object-fit: cover;
        }

        a {
            color: white !important;
        }

        .footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eeeeee;
            font-size: 12px;
            color: #888888;
        }

        .social-icons img {
            width: 32px;
            height: 32px;
            margin: 0 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img alt="CN.io" class="logo"
             src="https://firebasestorage.googleapis.com/v0/b/moviesite-5ed22.appspot.com/o/logo-no-background.png?alt=media&token=REMOVED_STORAGE_TOKEN"/>
    </div>
    <p style="font-size: 18px;">Hi,</p>
    <p style="font-size: 18px;">
        <a style="display: inline-block;
                  background-color: #8a2be2;
                  color: #ffffff !important;
                  padding: 15px 30px;
                  text-align: center;
                  margin-top: 20px;
                  font-size: 18px;
                  border-radius: 4px;
                  text-decoration: none;
                  cursor: pointer;"
           th:href="${resetLink}">Reset
            Password</a>
    <p>This email is meant for reset password If it was not requested by you, please ignore it.</p>
    <p>Best regards,<br/>CodeNaren.io</p>
    <div class="footer">
        <p>Follow us on:</p>
        <div class="social-icons">
            <a href="https://www.facebook.com/yourpage"><img
                    alt="Facebook"
                    src="https://firebasestorage.googleapis.com/v0/b/moviesite-5ed22.appspot.com/o/facebook-app-symbol.png?alt=media&token=REMOVED_STORAGE_TOKEN"></a>
            <a href="https://www.twitter.com/yourpage"><img
                    alt="Twitter"
                    src="https://firebasestorage.googleapis.com/v0/b/moviesite-5ed22.appspot.com/o/twitter.png?alt=media&token=REMOVED_STORAGE_TOKEN"></a>
            <a href="https://www.instagram.com/yourpage"><img
                    alt="Instagram"
                    src="https://firebasestorage.googleapis.com/v0/b/moviesite-5ed22.appspot.com/o/instagram.png?alt=media&token=REMOVED_STORAGE_TOKEN"></a>
        </div>
        <p>© 2024 CN.io - All rights reserved.</p>
    </div>
</div>
</body>
</html>
