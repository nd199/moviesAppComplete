server:
  error:
    include-message: always
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5342/movieott}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}

  flyway:
    enabled: true
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
          implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
    show-sql: true

  main:
    web-application-type: servlet

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-minimum-256-bits-long-for-testing-purpose}
    issuer: ${JWT_ISSUER:codeNaren.com}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
    superadmin-expiration-minutes: ${JWT_SUPERADMIN_EXPIRATION:5}

app:
  data-initialization:
    enabled: ${APP_DATA_INITIALIZATION_ENABLED:true}
  superadmin:
    email: ${SUPER_ADMIN_EMAIL:superadmin@movies.com}
    password: ${SUPER_ADMIN_PASSWORD:ChangeMe123!}
  demo:
    email: ${APP_DEMO_EMAIL:demo@moviesapp.com}
    password: ${APP_DEMO_PASSWORD:Demo1234567}
  brevo:
    api-key: ${BREVO_API_KEY:dev}
    sender:
      email: ${BREVO_SENDER_EMAIL:dev@localhost}
      name: ${BREVO_SENDER_NAME:MoviesApp}
  tmdb:
    api-key: ${TMDB_API_KEY:dev}
    base-url: https://api.themoviedb.org/3
    image-base-url: https://image.tmdb.org/t/p

logging:
  level:
    web: debug
    sql: debug
    org:
      springframework:
        security: debug
    com:
      naren:
        moviesapp: debug
