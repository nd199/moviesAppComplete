spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///movieott_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:testSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForTesting}
  issuer: ${JWT_ISSUER:test.com}
  expiration-minutes: 30
  refresh-expiration-days: 7

app:
  data-initialization:
    enabled: false

logging:
  level:
    com.naren.moviesapp: DEBUG
    org.springframework.test: INFO
