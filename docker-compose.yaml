services:
  db:
    container_name: postgres-mv
    image: postgres
    environment:
      POSTGRES_USER: codeNaren
      POSTGRES_PASSWORD: password
      POSTGRES_DB: movieott
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5332:5432"
    networks:
      - db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U codeNaren" ]
      interval: 10s
      timeout: 5s
      retries: 5

  db_message:
    container_name: redis-mv
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - db
    restart: unless-stopped

networks:
  db:
    driver: bridge

volumes:
  db:
