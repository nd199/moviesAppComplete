name: EC2 Deployment

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "docker-compose.yaml"
      - ".github/workflows/deploy.yml"

jobs:
  build:
    name: Build, Test & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Tests
        working-directory: backend
        run: mvn clean verify

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        working-directory: backend
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/movies-api:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/movies-api:latest .

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movies-api:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/movies-api:latest

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE="codenaren23/movies-api:${{ github.sha }}"

            echo "======================================"
            echo "DEPLOYING COMMIT"
            echo "======================================"
            echo "${{ github.sha }}"

            cd /home/ubuntu/deploy

            echo
            echo "===== CURRENT CONTAINER ====="
            docker ps

            echo
            echo "===== CURRENT IMAGES ====="
            docker images | grep movies-api || true

            echo
            echo "===== WAIT FOR DOCKER HUB ====="
            sleep 15

            echo
            echo "===== PULL IMAGE ====="
            docker pull $IMAGE

            echo
            echo "===== TAG AS LATEST ====="
            docker tag $IMAGE codenaren23/movies-api:latest

            echo
            echo "===== STOP OLD CONTAINER ====="
            docker compose down

            echo
            echo "===== START NEW CONTAINER ====="
            docker compose up -d --force-recreate --remove-orphans

            echo
            echo "===== VERIFY CONTAINER ====="
            docker ps

            echo
            echo "===== CONTAINER IMAGE ====="
            docker inspect movie-api --format='{{.Image}}'

            echo
            echo "===== LOCAL IMAGE ID ====="
            docker inspect codenaren23/movies-api:latest --format='{{.Id}}'

            echo
            echo "===== CLEANUP ====="
            docker image prune -af
            docker builder prune -af

            echo
            echo "===== DEPLOYMENT COMPLETED SUCCESSFULLY ====="